name: Build Site

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: site-build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Build documentation site
        run: mkdocs build --strict

      - name: Prepare deploy bundle
        run: |
          set -euo pipefail
          mkdir -p _bundle/public
          # MkDocs output → artifact public/ (graph viz included via docs/map/ symlink)
          cp -a site/. _bundle/public/
          # Worker source from this checkout (PR head on PR builds).
          mkdir -p _bundle/worker
          cp -a cloudflare_site/worker/. _bundle/worker/

      - uses: actions/upload-artifact@v4
        with:
          name: site
          path: _bundle/
          retention-days: 5
