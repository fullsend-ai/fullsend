# Reusable code agent workflow. Called by thin callers in .fullsend repos
# via workflow_call. Runs in the caller's repo context (secrets, checkout).
name: Code Agent

on:
  workflow_call:
    inputs:
      event_type:
        required: true
        type: string
      source_repo:
        required: true
        type: string
      event_payload:
        required: true
        type: string
      mint_url:
        required: true
        type: string
      gcp_region:
        required: true
        type: string
      fullsend_version:
        required: false
        type: string
        default: "latest"
      install_mode:
        required: false
        type: string
        default: "per-org"
      fullsend_ai_ref:
        description: Ref of fullsend-ai/fullsend to load actions from. Must match the ref used in the `uses:` line that calls this workflow.
        type: string
        required: false
        default: v0
    secrets:
      FULLSEND_GCP_WIF_PROVIDER:
        required: true
      FULLSEND_GCP_PROJECT_ID:
        required: true

jobs:
  code:
    name: Code
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      id-token: write
      issues: write
      packages: read
      pull-requests: write

    steps:
      - name: Checkout config repository
        uses: actions/checkout@v7

      - name: Checkout upstream defaults
        # Keep in sync with --vendor marker paths (see internal/scaffold/vendorcontent.go VendoredMarkerPath).
        if: hashFiles('.defaults/action.yml', '.fullsend/.defaults/action.yml') == ''
        uses: actions/checkout@v7
        with:
          repository: fullsend-ai/fullsend
          ref: ${{ inputs.fullsend_ai_ref }}
          path: .defaults
          fetch-depth: 1
          sparse-checkout: |
            .github/actions/
            .github/scripts/
            internal/scaffold/fullsend-repo/
            action.yml

      - name: Prepare workspace (upstream defaults + org/repo overrides)
        env:
          INSTALL_MODE: ${{ inputs.install_mode }}
        run: |
          set -euo pipefail
          if [[ "${INSTALL_MODE}" != "per-org" && "${INSTALL_MODE}" != "per-repo" ]]; then
            echo "::error::Invalid install_mode '${INSTALL_MODE}': must be 'per-org' or 'per-repo'"
            exit 1
          fi
          SRC=".defaults/internal/scaffold/fullsend-repo"
          LAYERED_DIRS="agents skills schemas harness plugins policies scripts env"
          for dir in ${LAYERED_DIRS}; do
            if [[ -d "${SRC}/${dir}" ]]; then
              mkdir -p "${dir}"
              cp -r "${SRC}/${dir}/." "${dir}/"
            fi
          done
          CUSTOM_BASE="customized"
          if [[ "${INSTALL_MODE}" == "per-repo" ]]; then
            CUSTOM_BASE=".fullsend/customized"
          fi
          for dir in ${LAYERED_DIRS}; do
            if [[ -d "${CUSTOM_BASE}/${dir}" ]]; then
              find "${CUSTOM_BASE}/${dir}" -type f ! -name '.gitkeep' -print0 \
                | while IFS= read -r -d '' f; do
                    rel="${f#"${CUSTOM_BASE}"/}"
                    mkdir -p "$(dirname "${rel}")"
                    cp "${f}" "${rel}"
                  done
            fi
          done
          mkdir -p .github/scripts
          cp "${SRC}/.github/scripts/setup-agent-env.sh" .github/scripts/setup-agent-env.sh


      - name: Validate enrollment and extract repo metadata
        id: repo-parts
        uses: ./.defaults/.github/actions/validate-enrollment
        with:
          source_repo: ${{ inputs.source_repo }}
          install_mode: ${{ inputs.install_mode }}

      - name: Mint coder token
        id: app-token
        uses: ./.defaults/.github/actions/mint-token
        with:
          role: coder
          repos: ${{ steps.repo-parts.outputs.name }}
          mint_url: ${{ inputs.mint_url }}

      - name: Checkout target repository
        uses: actions/checkout@v7
        with:
          repository: ${{ inputs.source_repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: target-repo
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve target branch
        id: resolve-branch
        env:
          EVENT_PAYLOAD: ${{ inputs.event_payload }}
          SOURCE_REPO: ${{ inputs.source_repo }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          # 1. Check for explicit --branch override in comment
          COMMENT_BODY="$(echo "${EVENT_PAYLOAD}" | jq -r '.comment.body // empty')"
          EXPLICIT_BRANCH=""
          if [[ -n "${COMMENT_BODY}" ]]; then
            EXPLICIT_BRANCH="$(printf '%s\n' "${COMMENT_BODY}" \
              | head -1 | tr -d '\r' \
              | grep -oP '(?<=--branch\s)\S+' || true)"
          fi

          # 2. Auto-detect repo default branch via API
          DEFAULT_BRANCH="$(gh api "repos/${SOURCE_REPO}" \
            --jq '.default_branch' 2>/dev/null || echo '')"

          # 3. Fallback chain: explicit > repo default > "main"
          if [[ -n "${EXPLICIT_BRANCH}" ]]; then
            TARGET="${EXPLICIT_BRANCH}"
            echo "Using explicit branch override: ${TARGET}"
          elif [[ -n "${DEFAULT_BRANCH}" ]]; then
            TARGET="${DEFAULT_BRANCH}"
            echo "Using repo default branch: ${TARGET}"
          else
            TARGET="main"
            echo "::warning::Could not detect default branch — falling back to 'main'"
          fi

          # 4. Validate branch name
          if [[ ! "${TARGET}" =~ ^[a-zA-Z0-9._/-]+$ ]]; then
            echo "::error::Invalid branch name: '${TARGET}'"
            exit 1
          fi

          echo "target_branch=${TARGET}" >> "${GITHUB_OUTPUT}"

      - name: Validate inputs
        id: validate
        env:
          ISSUE_NUMBER: ${{ fromJSON(inputs.event_payload).issue.number }}
          REPO_FULL_NAME: ${{ inputs.source_repo }}
          GITHUB_ISSUE_URL: ${{ fromJSON(inputs.event_payload).issue.html_url }}
          COMMENT_BODY: ${{ fromJSON(inputs.event_payload).comment.body }}
        run: bash scripts/pre-code.sh

      - name: Setup GCP and prepare credentials
        if: steps.validate.outputs.skipped != 'true'
        uses: ./.defaults/.github/actions/setup-gcp
        with:
          gcp_wif_provider: ${{ secrets.FULLSEND_GCP_WIF_PROVIDER }}
          gcp_project_id: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}

      - name: Resolve bot identity
        if: steps.validate.outputs.skipped != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          read -r BOT_LOGIN BOT_USER_ID < <(
            gh api graphql -f query='{ viewer { login databaseId } }' \
              | jq -r '.data.viewer | "\(.login) \(.databaseId)"'
          )
          GIT_BOT_EMAIL="${BOT_USER_ID}+${BOT_LOGIN}@users.noreply.github.com"
          echo "Resolved bot identity: ${BOT_LOGIN} (${BOT_USER_ID})"
          echo "GIT_BOT_EMAIL=${GIT_BOT_EMAIL}" >> "${GITHUB_ENV}"

      - name: Setup agent environment
        if: steps.validate.outputs.skipped != 'true'
        env:
          AGENT_PREFIX: CODE_
          CODE_GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CODE_TARGET_REPO_DIR: target-repo
          CODE_ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
          CODE_CLOUD_ML_REGION: ${{ inputs.gcp_region }}
          CODE_ISSUE_NUMBER: ${{ fromJSON(inputs.event_payload).issue.number }}
        run: bash .github/scripts/setup-agent-env.sh

      - name: Run code agent
        if: steps.validate.outputs.skipped != 'true'
        uses: ./.defaults/
        env:
          GITHUB_ISSUE_URL: ${{ fromJSON(inputs.event_payload).issue.html_url }}
          ISSUE_NUMBER: ${{ fromJSON(inputs.event_payload).issue.number }}
          REPO_FULL_NAME: ${{ inputs.source_repo }}
          PUSH_TOKEN: ${{ steps.app-token.outputs.token }}
          PUSH_TOKEN_SOURCE: github-app
          TARGET_BRANCH: ${{ steps.resolve-branch.outputs.target_branch }}
        with:
          agent: code
          version: ${{ inputs.fullsend_version }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          status-repo: ${{ inputs.source_repo }}
          status-number: ${{ fromJSON(inputs.event_payload).issue.number }}
          mint-url: ${{ inputs.mint_url }}
