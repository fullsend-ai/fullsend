codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "60...80"
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%
        threshold: 5%

ignore:
  - "**/*_test.go"
  - "**/testdata/**"
  - "e2e/behaviour/**"
  - "docs/**"
  - "hack/**"
  - "experiments/**"
  - "images/**"
  - "**/*.md"
  - "**/*.sh"
  # See https://github.com/fullsend-ai/fullsend/issues/2831
  - "internal/cli/run.go"

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false
