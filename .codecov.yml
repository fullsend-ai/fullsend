codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "60...80"
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%
        threshold: 5%

ignore:
  - "**/*_test.go"
  - "**/testdata/**"
  - "e2e/behaviour/suite_test.go"
  - "e2e/behaviour/features/**"
  - "e2e/behaviour/fixtures/**"
  - "pkg/behaviourtest/steps/dispatch.go"
  - "docs/**"
  - "hack/**"
  - "experiments/**"
  - "images/**"
  - "**/*.md"
  - "**/*.sh"

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false
