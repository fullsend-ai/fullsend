---
agent: agents/triage.md
doc: docs/agents/triage.md
model: opus
image: ghcr.io/fullsend-ai/fullsend-sandbox:latest
policy: policies/triage.yaml

host_files:
  - src: env/gcp-vertex.env
    dest: /sandbox/workspace/.env.d/gcp-vertex.env
    expand: true
  - src: ${GOOGLE_APPLICATION_CREDENTIALS}
    dest: /tmp/.gcp-credentials.json
  - src: ${GCP_OIDC_TOKEN_FILE}
    dest: /sandbox/workspace/.gcp-oidc-token
    optional: true
  - src: env/triage.env
    dest: /sandbox/workspace/.env.d/triage.env
    expand: true
  # Jira context JSON — pre-script writes this on host; only exists for Jira runs.
  - src: /tmp/fullsend-triage-context-${ISSUE_KEY}.json
    dest: /sandbox/workspace/issue-context.json
    optional: true

skills:
  - skills/issue-labels

pre_script: scripts/pre-triage.sh

validation_loop:
  script: scripts/validate-output-schema.sh
  max_iterations: 2

post_script: scripts/post-triage.sh

runner_env:
  TRIAGE_SOURCE: ${TRIAGE_SOURCE}
  GH_TOKEN: ${GH_TOKEN}
  FULLSEND_OUTPUT_SCHEMA: ${FULLSEND_DIR}/schemas/triage-result.schema.json
  # GitHub-specific (empty when source=jira)
  GITHUB_ISSUE_URL: ${GITHUB_ISSUE_URL}
  # Jira-specific (empty when source=github)
  ISSUE_KEY: ${ISSUE_KEY}
  JIRA_HOST: ${JIRA_HOST}
  LINKED_GITHUB_REPOS: ${LINKED_GITHUB_REPOS}

timeout_minutes: 10
