---
agent: agents/jira-triage.md
doc: docs/agents/jira-triage.md
model: opus
image: ghcr.io/fullsend-ai/fullsend-sandbox:latest
policy: policies/jira-triage.yaml

host_files:
  - src: env/gcp-vertex.env
    dest: /sandbox/workspace/.env.d/gcp-vertex.env
    expand: true
  - src: ${GOOGLE_APPLICATION_CREDENTIALS}
    dest: /tmp/.gcp-credentials.json
  - src: ${GCP_OIDC_TOKEN_FILE}
    dest: /sandbox/workspace/.gcp-oidc-token
    optional: true
  - src: env/jira-triage.env
    dest: /sandbox/workspace/.env.d/jira-triage.env
    expand: true
  - src: /tmp/fullsend-jira-context-${ISSUE_KEY}.json
    dest: /sandbox/workspace/issue-context.json

# JIRA_EMAIL and JIRA_API_TOKEN intentionally excluded from sandbox env.
# Pre/post scripts inherit these from the workflow step environment.

pre_script: scripts/pre-jira-triage.sh

validation_loop:
  script: scripts/validate-output-schema.sh
  max_iterations: 2

post_script: scripts/post-jira-triage.sh

runner_env:
  ISSUE_KEY: ${ISSUE_KEY}
  JIRA_HOST: ${JIRA_HOST}
  LINKED_GITHUB_REPOS: ${LINKED_GITHUB_REPOS}
  GH_TOKEN: ${GH_TOKEN}
  FULLSEND_OUTPUT_SCHEMA: ${FULLSEND_DIR}/schemas/jira-triage-result.schema.json

timeout_minutes: 10
