---
name: Jira Dispatch

on:
  repository_dispatch:
    types:
      - jira-issue-created
      - jira-command

jobs:
  route:
    name: Route Jira Event
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      id-token: write
    steps:
      - name: Checkout config repository
        uses: actions/checkout@v6

      - name: Validate Jira enrollment
        id: validate
        env:
          PROJECT_KEY: ${{ github.event.client_payload.project_key }}
          ISSUE_KEY: ${{ github.event.client_payload.issue_key }}
        run: |
          set -euo pipefail
          if [[ ! "${PROJECT_KEY}" =~ ^[A-Z][A-Z0-9_]{0,9}$ ]]; then
            echo "::error::Invalid project_key format: ${PROJECT_KEY}"
            exit 1
          fi
          if [[ ! "${ISSUE_KEY}" =~ ^[A-Z][A-Z0-9_]{0,9}-[0-9]+$ ]]; then
            echo "::error::Invalid issue_key format: ${ISSUE_KEY}"
            exit 1
          fi
          # Check project is enrolled in config.yaml
          CONFIG_FILE="config.yaml"
          if [[ ! -f "${CONFIG_FILE}" ]]; then
            echo "::error::config.yaml not found in .fullsend repo"
            exit 1
          fi
          ENROLLED=$(PROJECT_KEY="${PROJECT_KEY}" python3 -c "
          import os, yaml
          key = os.environ['PROJECT_KEY']
          with open('config.yaml') as f:
              cfg = yaml.safe_load(f)
          projects = cfg.get('jira_projects', [])
          keys = [p.get('project_key','') for p in projects]
          print('true' if key in keys else 'false')
          " 2>/dev/null || echo "false")
          if [[ "${ENROLLED}" != "true" ]]; then
            echo "::error::Jira project ${PROJECT_KEY} is not enrolled in fullsend"
            exit 1
          fi
          echo "project_key=${PROJECT_KEY}" >> "$GITHUB_OUTPUT"
          echo "issue_key=${ISSUE_KEY}" >> "$GITHUB_OUTPUT"
          echo "::notice::Routing Jira event for ${PROJECT_KEY}: ${ISSUE_KEY}"

      - name: Mint dispatch token via OIDC
        id: oidc-mint
        env:
          MINT_URL: ${{ vars.FULLSEND_MINT_URL }}
        run: |
          set -euo pipefail
          if [[ -z "$MINT_URL" ]]; then
            echo "::error::FULLSEND_MINT_URL org variable is not set"
            exit 1
          fi
          echo "::add-mask::$MINT_URL"
          OIDC_TOKEN=$(curl -sSf --retry 3 --retry-delay 2 --retry-all-errors \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=fullsend-mint" | jq -r '.value')
          if [[ -z "$OIDC_TOKEN" || "$OIDC_TOKEN" == "null" ]]; then
            echo "::error::Failed to obtain OIDC token"
            exit 1
          fi
          echo "::add-mask::$OIDC_TOKEN"
          TOKEN=$(curl -sSf --retry 5 --retry-delay 5 --retry-all-errors \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"role":"fullsend","repos":[".fullsend"]}' \
            "${MINT_URL}/v1/token" | jq -r '.token')
          if [[ -z "$TOKEN" || "$TOKEN" == "null" ]]; then
            echo "::error::Token mint returned no token"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Dispatch jira-triage
        env:
          GH_TOKEN: ${{ steps.oidc-mint.outputs.token }}
        run: |
          gh workflow run jira-triage.yml \
            --repo "${{ github.repository }}" \
            -f issue_key="${{ steps.validate.outputs.issue_key }}" \
            -f project_key="${{ steps.validate.outputs.project_key }}"
