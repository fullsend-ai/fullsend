---
# lint-workflow-size: max-lines=470
# Dispatcher workflow that routes events to agent workflows based on stage.
# Routing logic determines the stage from event context — the shim only
# forwards the raw event.  Adding a new stage requires only a case branch
# here; zero changes to enrolled repos.
name: Dispatch

on:
  workflow_call:
    inputs:
      event_action:
        description: 'The event action (github.event.action) forwarded by the shim'
        required: true
        type: string
    secrets:
      FULLSEND_GCP_WIF_PROVIDER:
        required: true
      FULLSEND_GCP_PROJECT_ID:
        required: true

permissions:
  actions: write
  id-token: write
  contents: write
  issues: write
  packages: read
  pull-requests: write

jobs:
  dispatch:
    uses: fullsend-ai/fullsend/.github/workflows/reusable-dispatch.yml@v0
    with:
      event_action: ${{ inputs.event_action }}
      mint_url: ${{ vars.FULLSEND_MINT_URL }}
      gcp_region: ${{ vars.FULLSEND_GCP_REGION }}
      install_mode: per-org
      fullsend_ai_ref: v0
    secrets:
      FULLSEND_GCP_WIF_PROVIDER: ${{ secrets.FULLSEND_GCP_WIF_PROVIDER }}
      FULLSEND_GCP_PROJECT_ID: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
