# fullsend shim workflow
# Routes events to per-role agent dispatch workflows in .fullsend.
#
# Security: pull_request_target runs the BASE branch version of this workflow,
# preventing PRs from modifying it to exfiltrate the dispatch token.
# This shim never checks out PR code, so it is not vulnerable to "pwn request"
# attacks (see: Trivy CVE-2026-33634, hackerbot-claw campaign).
#
# The event payload is built from individual context fields (not inline shell)
# to prevent script injection from attacker-controlled fields like issue
# titles, comment bodies, and PR descriptions.
#
# Only the fields consumed by downstream workflows are dispatched. The full
# github.event can exceed GitHub's 65KB workflow_dispatch input limit on
# large dependency-update PRs (Renovate/Mintmaker bodies alone can be ~38KB).
name: fullsend

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, ready_for_review]

jobs:
  dispatch-triage:
    runs-on: ubuntu-latest
    concurrency:
      group: triage-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: true
    if: >-
      github.event_name == 'issue_comment' && (
        github.event.comment.body == '/triage' ||
        startsWith(github.event.comment.body, '/triage ') ||
        (
          (github.event.comment.author_association != 'NONE' ||
            github.event.comment.user.login == github.event.issue.user.login) &&
          !endsWith(github.event.comment.user.login, '[bot]') &&
          contains(toJSON(github.event.issue.labels.*.name), 'needs-info') &&
          !contains(toJSON(github.event.issue.labels.*.name), 'type/feature')
        )
      )
    steps:
      - name: Build minimal payload
        id: payload
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_HTML_URL: ${{ github.event.issue.html_url }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -cn \
            --arg in "${ISSUE_NUMBER:-}" \
            --arg iu "${ISSUE_HTML_URL:-}" \
            '{issue: {number: (if $in != "" then ($in | tonumber) else null end), html_url: (if $iu != "" then $iu else null end)}}')
          echo "json=$PAYLOAD" >> "$GITHUB_OUTPUT"
      - name: Dispatch triage
        env:
          GH_TOKEN: ${{ secrets.FULLSEND_DISPATCH_TOKEN }}
          EVENT_PAYLOAD: ${{ steps.payload.outputs.json }}
          EVENT_TYPE: ${{ github.event_name }}
          SOURCE_REPO: ${{ github.repository }}
          DISPATCH_REPO: ${{ github.repository_owner }}/.fullsend
        run: |
          gh workflow run triage.yml \
            --repo "$DISPATCH_REPO" \
            --field event_type="$EVENT_TYPE" \
            --field source_repo="$SOURCE_REPO" \
            --field event_payload="$EVENT_PAYLOAD"
      - name: Post run links
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_TOKEN: ${{ secrets.FULLSEND_DISPATCH_TOKEN }}
          DISPATCH_REPO: ${{ github.repository_owner }}/.fullsend
          ITEM_NUMBER: ${{ github.event.issue.number }}
          WORKFLOW_FILE: triage.yml
          AGENT_LABEL: triage
        run: |
          set -euo pipefail
          SHIM_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          DISPATCH_RUN_URL=""
          for attempt in 1 2 3; do
            sleep 3
            DISPATCH_RUN_URL=$(GH_TOKEN="$DISPATCH_TOKEN" gh run list \
              --repo "$DISPATCH_REPO" \
              --workflow "$WORKFLOW_FILE" \
              --limit 1 \
              --json url \
              --jq '.[0].url' 2>/dev/null) && [ -n "$DISPATCH_RUN_URL" ] && break
            DISPATCH_RUN_URL=""
          done
          DISPATCH_FALLBACK="${GITHUB_SERVER_URL}/${DISPATCH_REPO}/actions/workflows/${WORKFLOW_FILE}"
          DISPATCH_LINK="${DISPATCH_RUN_URL:-$DISPATCH_FALLBACK}"
          MARKER="<!-- fullsend:run-links:${AGENT_LABEL} -->"
          BODY=$(cat <<EOF
          ${MARKER}
          **fullsend ${AGENT_LABEL}** is running

          - Shim workflow: [Run ${GITHUB_RUN_ID}](${SHIM_URL})
          - Agent workflow: [View run](${DISPATCH_LINK})
          EOF
          )
          EXISTING_ID=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${ITEM_NUMBER}/comments" \
            --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" 2>/dev/null | head -1 || true)
          if [ -n "$EXISTING_ID" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${EXISTING_ID}" \
              -X PATCH -f body="$BODY"
          else
            gh issue comment "$ITEM_NUMBER" --repo "${GITHUB_REPOSITORY}" --body "$BODY"
          fi

  dispatch-code:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'issues' && github.event.action == 'labeled'
        && github.event.label.name == 'ready-to-code') ||
      (github.event_name == 'issue_comment' && (
        github.event.comment.body == '/code' ||
        startsWith(github.event.comment.body, '/code ')
      ))
    steps:
      - name: Build minimal payload
        id: payload
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_HTML_URL: ${{ github.event.issue.html_url }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -cn \
            --arg in "${ISSUE_NUMBER:-}" \
            --arg iu "${ISSUE_HTML_URL:-}" \
            '{issue: {number: (if $in != "" then ($in | tonumber) else null end), html_url: (if $iu != "" then $iu else null end)}}')
          echo "json=$PAYLOAD" >> "$GITHUB_OUTPUT"
      - name: Dispatch code
        env:
          GH_TOKEN: ${{ secrets.FULLSEND_DISPATCH_TOKEN }}
          EVENT_PAYLOAD: ${{ steps.payload.outputs.json }}
          EVENT_TYPE: ${{ github.event_name }}
          SOURCE_REPO: ${{ github.repository }}
          DISPATCH_REPO: ${{ github.repository_owner }}/.fullsend
        run: |
          gh workflow run code.yml \
            --repo "$DISPATCH_REPO" \
            --field event_type="$EVENT_TYPE" \
            --field source_repo="$SOURCE_REPO" \
            --field event_payload="$EVENT_PAYLOAD"
      - name: Post run links
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_TOKEN: ${{ secrets.FULLSEND_DISPATCH_TOKEN }}
          DISPATCH_REPO: ${{ github.repository_owner }}/.fullsend
          ITEM_NUMBER: ${{ github.event.issue.number }}
          WORKFLOW_FILE: code.yml
          AGENT_LABEL: code
        run: |
          set -euo pipefail
          SHIM_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          DISPATCH_RUN_URL=""
          for attempt in 1 2 3; do
            sleep 3
            DISPATCH_RUN_URL=$(GH_TOKEN="$DISPATCH_TOKEN" gh run list \
              --repo "$DISPATCH_REPO" \
              --workflow "$WORKFLOW_FILE" \
              --limit 1 \
              --json url \
              --jq '.[0].url' 2>/dev/null) && [ -n "$DISPATCH_RUN_URL" ] && break
            DISPATCH_RUN_URL=""
          done
          DISPATCH_FALLBACK="${GITHUB_SERVER_URL}/${DISPATCH_REPO}/actions/workflows/${WORKFLOW_FILE}"
          DISPATCH_LINK="${DISPATCH_RUN_URL:-$DISPATCH_FALLBACK}"
          MARKER="<!-- fullsend:run-links:${AGENT_LABEL} -->"
          BODY=$(cat <<EOF
          ${MARKER}
          **fullsend ${AGENT_LABEL}** is running

          - Shim workflow: [Run ${GITHUB_RUN_ID}](${SHIM_URL})
          - Agent workflow: [View run](${DISPATCH_LINK})
          EOF
          )
          EXISTING_ID=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${ITEM_NUMBER}/comments" \
            --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" 2>/dev/null | head -1 || true)
          if [ -n "$EXISTING_ID" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${EXISTING_ID}" \
              -X PATCH -f body="$BODY"
          else
            gh issue comment "$ITEM_NUMBER" --repo "${GITHUB_REPOSITORY}" --body "$BODY"
          fi

  dispatch-review:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'issues' && github.event.action == 'labeled'
        && github.event.label.name == 'ready-for-review') ||
      (github.event_name == 'issue_comment' && (
        github.event.comment.body == '/review' ||
        startsWith(github.event.comment.body, '/review ')
      )) ||
      github.event_name == 'pull_request_target'
    steps:
      - name: Build minimal payload
        id: payload
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_HTML_URL: ${{ github.event.issue.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HTML_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -cn \
            --arg in "${ISSUE_NUMBER:-}" \
            --arg iu "${ISSUE_HTML_URL:-}" \
            --arg pn "${PR_NUMBER:-}" \
            --arg pu "${PR_HTML_URL:-}" \
            '{issue: {number: (if $in != "" then ($in | tonumber) else null end), html_url: (if $iu != "" then $iu else null end)},
              pull_request: {number: (if $pn != "" then ($pn | tonumber) else null end), html_url: (if $pu != "" then $pu else null end)}}')
          echo "json=$PAYLOAD" >> "$GITHUB_OUTPUT"
      - name: Dispatch review
        env:
          GH_TOKEN: ${{ secrets.FULLSEND_DISPATCH_TOKEN }}
          EVENT_PAYLOAD: ${{ steps.payload.outputs.json }}
          EVENT_TYPE: ${{ github.event_name }}
          SOURCE_REPO: ${{ github.repository }}
          DISPATCH_REPO: ${{ github.repository_owner }}/.fullsend
        run: |
          gh workflow run review.yml \
            --repo "$DISPATCH_REPO" \
            --field event_type="$EVENT_TYPE" \
            --field source_repo="$SOURCE_REPO" \
            --field event_payload="$EVENT_PAYLOAD"
      - name: Post run links
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_TOKEN: ${{ secrets.FULLSEND_DISPATCH_TOKEN }}
          DISPATCH_REPO: ${{ github.repository_owner }}/.fullsend
          ITEM_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          WORKFLOW_FILE: review.yml
          AGENT_LABEL: review
        run: |
          set -euo pipefail
          SHIM_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          DISPATCH_RUN_URL=""
          for attempt in 1 2 3; do
            sleep 3
            DISPATCH_RUN_URL=$(GH_TOKEN="$DISPATCH_TOKEN" gh run list \
              --repo "$DISPATCH_REPO" \
              --workflow "$WORKFLOW_FILE" \
              --limit 1 \
              --json url \
              --jq '.[0].url' 2>/dev/null) && [ -n "$DISPATCH_RUN_URL" ] && break
            DISPATCH_RUN_URL=""
          done
          DISPATCH_FALLBACK="${GITHUB_SERVER_URL}/${DISPATCH_REPO}/actions/workflows/${WORKFLOW_FILE}"
          DISPATCH_LINK="${DISPATCH_RUN_URL:-$DISPATCH_FALLBACK}"
          MARKER="<!-- fullsend:run-links:${AGENT_LABEL} -->"
          BODY=$(cat <<EOF
          ${MARKER}
          **fullsend ${AGENT_LABEL}** is running

          - Shim workflow: [Run ${GITHUB_RUN_ID}](${SHIM_URL})
          - Agent workflow: [View run](${DISPATCH_LINK})
          EOF
          )
          EXISTING_ID=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${ITEM_NUMBER}/comments" \
            --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" 2>/dev/null | head -1 || true)
          if [ -n "$EXISTING_ID" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${EXISTING_ID}" \
              -X PATCH -f body="$BODY"
          else
            gh issue comment "$ITEM_NUMBER" --repo "${GITHUB_REPOSITORY}" --body "$BODY"
          fi
