issue_body: |
  ## Bug: Login fails after password reset

  **Environment:** Production
  **Version:** 2.3.1

  After a user resets their password, attempting to log in immediately fails
  with a 401 error. The workaround is to wait 60 seconds before logging in.

  This appears to be a cache invalidation issue in the auth service.

  **Steps to reproduce:**
  1. Reset password via /forgot-password
  2. Immediately try to log in with the new password
  3. 401 Unauthorized

  **Expected:** Login succeeds immediately after password reset.
